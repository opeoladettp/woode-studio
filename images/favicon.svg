<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="hsl(36,30%,97%)"/>
  <!-- WOODE line -->
  <text
    x="50" y="44"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="2"
    text-anchor="middle"
    fill="hsl(0,0%,10%)"
    text-rendering="geometricPrecision">WOODE</text>
  <!-- STUDIO line -->
  <text
    x="43" y="70"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="2"
    text-anchor="middle"
    fill="hsl(0,0%,10%)"
    text-rendering="geometricPrecision">STUDIO</text>
  <!-- Orange dot - bottom right of STUDIO -->
  <text
    x="90" y="72"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="30"
    text-anchor="middle"
    fill="hsl(22,90%,41%)"
    text-rendering="geometricPrecision">.</text>
</svg>
